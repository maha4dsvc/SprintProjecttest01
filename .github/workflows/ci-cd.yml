name: CI/CD Pipeline

on:
  push:
    branches: [ master, main ]
  pull_request:
    branches: [ master, main ]

env:
  JAVA_VERSION: '17'
  IMAGE_NAME: sprintprojecttest01

jobs:

  # ─────────────────────────────────────────
  # Stage 1 — Compile
  # ─────────────────────────────────────────
  compile:
    name: Compile
    runs-on: ubuntu-latest
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Compile
        run: mvn compile -B --no-transfer-progress

  # ─────────────────────────────────────────
  # Stage 2 — Security Checks
  # ─────────────────────────────────────────
  security-checks:
    name: Security Checks
    runs-on: ubuntu-latest
    needs: compile
    steps:
      - name: Checkout source
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Gitleaks — Secret Scan
        uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Trivy — Filesystem & Dependency Scan
        uses: aquasecurity/trivy-action@master
        with:
          scan-type: fs
          scan-ref: .
          format: table
          exit-code: '0'
          ignore-unfixed: true
          severity: CRITICAL,HIGH
          output: trivy-fs-report.txt

      - name: Upload Trivy FS Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-fs-report
          path: trivy-fs-report.txt
          retention-days: 14

  # ─────────────────────────────────────────
  # Stage 3 — Test
  # ─────────────────────────────────────────
  test:
    name: Test
    runs-on: ubuntu-latest
    needs: security-checks
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Run Tests
        run: mvn test -B --no-transfer-progress

      - name: Upload Test Results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: test-results
          path: target/surefire-reports/
          retention-days: 14

  # ─────────────────────────────────────────
  # Stage 4 — Package
  # ─────────────────────────────────────────
  package:
    name: Package
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Set up JDK ${{ env.JAVA_VERSION }}
        uses: actions/setup-java@v4
        with:
          java-version: ${{ env.JAVA_VERSION }}
          distribution: temurin
          cache: maven

      - name: Package JAR
        run: mvn package -DskipTests -B --no-transfer-progress

      - name: Upload JAR Artifact
        uses: actions/upload-artifact@v4
        with:
          name: app-jar
          path: target/*.jar
          retention-days: 1

  # ─────────────────────────────────────────
  # Stage 5 — Build & Push Docker Image
  # ─────────────────────────────────────────
  docker:
    name: Build & Push Docker Image
    runs-on: ubuntu-latest
    needs: package
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Checkout source
        uses: actions/checkout@v4

      - name: Download JAR Artifact
        uses: actions/download-artifact@v4
        with:
          name: app-jar
          path: target/

      - name: Verify DockerHub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is missing."
            echo "Go to: GitHub repo → Settings → Secrets and variables → Actions → New repository secret"
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is missing."
            echo "Get a token at: DockerHub → Account Settings → Security → New Access Token"
            exit 1
          fi
          echo "DockerHub secrets are set."

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}
          tags: |
            type=raw,value=latest
            type=sha,prefix=,format=short

      - name: Build and Push Image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Scan Image with Trivy
        uses: aquasecurity/trivy-action@master
        with:
          image-ref: ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          format: table
          exit-code: '0'
          severity: CRITICAL,HIGH
          output: trivy-report.txt

      - name: Upload Trivy Report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: trivy-image-report
          path: trivy-report.txt
          retention-days: 14

  # ─────────────────────────────────────────
  # Stage 6 — Run Container & Smoke Test
  # ─────────────────────────────────────────
  deploy:
    name: Run Container
    runs-on: ubuntu-latest
    needs: docker
    if: github.event_name == 'push' && (github.ref == 'refs/heads/master' || github.ref == 'refs/heads/main')
    steps:
      - name: Verify DockerHub secrets
        run: |
          if [ -z "${{ secrets.DOCKERHUB_USERNAME }}" ]; then
            echo "ERROR: DOCKERHUB_USERNAME secret is missing."
            exit 1
          fi
          if [ -z "${{ secrets.DOCKERHUB_TOKEN }}" ]; then
            echo "ERROR: DOCKERHUB_TOKEN secret is missing."
            exit 1
          fi
          echo "DockerHub secrets are set."

      - name: Log in to DockerHub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Pull latest image
        run: docker pull ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Stop existing container (if any)
        run: docker rm -f loginapp || true

      - name: Run container
        run: |
          docker run -d \
            --name loginapp \
            -p 8080:8080 \
            --restart unless-stopped \
            ${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest

      - name: Wait for app to start
        run: |
          echo "Waiting for application to be ready..."
          for i in $(seq 1 20); do
            if curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login | grep -qE "200|302"; then
              echo "App is up after ${i}s"
              exit 0
            fi
            sleep 3
          done
          echo "App did not respond in time" && exit 1

      - name: Smoke test — login page responds
        run: |
          STATUS=$(curl -s -o /dev/null -w "%{http_code}" http://localhost:8080/login)
          echo "HTTP status: $STATUS"
          [ "$STATUS" = "200" ] || [ "$STATUS" = "302" ]

      - name: Show container logs
        if: always()
        run: docker logs loginapp

      - name: Get container info
        id: container_info
        run: |
          CONTAINER_ID=$(docker inspect --format='{{.Id}}' loginapp | cut -c1-12)
          CONTAINER_IP=$(docker inspect --format='{{range .NetworkSettings.Networks}}{{.IPAddress}}{{end}}' loginapp)
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          echo "container_id=$CONTAINER_ID" >> $GITHUB_OUTPUT
          echo "container_ip=$CONTAINER_IP" >> $GITHUB_OUTPUT
          echo "image=$IMAGE" >> $GITHUB_OUTPUT

      - name: Print access URLs
        run: |
          echo "=============================================="
          echo "  CONTAINER IS RUNNING"
          echo "=============================================="
          echo "  Container Name : loginapp"
          echo "  Container ID   : ${{ steps.container_info.outputs.container_id }}"
          echo "  Container IP   : ${{ steps.container_info.outputs.container_ip }}"
          echo "  App URL        : http://localhost:8080"
          echo "  Login page     : http://localhost:8080/login"
          echo "  Home page      : http://localhost:8080/home"
          echo ""
          echo "  DockerHub Image: ${{ steps.container_info.outputs.image }}"
          echo ""
          echo "  Run anywhere:"
          echo "  docker run -d -p 8080:8080 ${{ steps.container_info.outputs.image }}"
          echo "  then open: http://localhost:8080/login"
          echo "=============================================="

      - name: Write job summary
        run: |
          IMAGE=${{ secrets.DOCKERHUB_USERNAME }}/${{ env.IMAGE_NAME }}:latest
          cat >> $GITHUB_STEP_SUMMARY << EOF
          ## Deployment Successful

          | Detail | Value |
          |--------|-------|
          | Container Name | \`loginapp\` |
          | Container ID | \`${{ steps.container_info.outputs.container_id }}\` |
          | Port | \`8080\` |
          | DockerHub Image | \`$IMAGE\` |

          ### Access URLs
          | Page | URL |
          |------|-----|
          | Login | http://localhost:8080/login |
          | Home | http://localhost:8080/home |

          ### Run the container on any machine
          \`\`\`bash
          docker pull $IMAGE
          docker run -d --name loginapp -p 8080:8080 $IMAGE
          \`\`\`
          Then open: **http://localhost:8080/login**

          ### Default credentials
          | Username | Password |
          |----------|----------|
          | \`admin\` | \`password\` |
          EOF
